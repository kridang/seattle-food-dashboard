<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Seattle Food Dashboard</title>
  <link rel="icon" type="image/x-icon" href="assets/sfdfavi.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/main.js"></script>
</head>

<body>
  <header>
    <div class="logo">
      <img src="assets/sfdfavi.png" class="logo-img" alt="Seattle Food Logo">
      <a>Seattle Food Dashboard</a>
    </div>

    <nav class="nav-bar">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="map.html" id="cta">View Map</a>
    </nav>
  </header>

  <div class="map-container">
    <div class="left-section">

      <!-- when no dot is selected: default display: summary + charts -->
      <div id="default-view">
        <div class="info-card description-card">
          <h3>Seattle Restaurant Overview</h3>
          <p>Click on any dot for more info!</p>
        </div>

        <div class="info-card summary-card">
        <h3>Number of Restaurants Collected in This Map:</h3>
        <p id="restaurantCount">number</p>
      </div>

        <div class="info-card chart-card">
          <h3>Restaurant Categories</h3>
          <canvas id="categoryChart"></canvas>
        </div>

        <div class="info-card chart-card">
          <h3>Restaurants by Price Range</h3>
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <!-- when a dot is selected: detailed information -->
      <div id="detail-view" style="display:none;">
        <div class="info-card card-details">
          <h3 id="restaurant-name">Information</h3>
          <p id="restaurant-stars"></p>
          <p id="restaurant-area"></p>
          <p id="restaurant-category"></p>
          <p id="restaurant-price"></p>
          <p id="restaurant-coords"></p>
          <button id="back-btn">Back to overview</button>
        </div>
      </div>

    </div>

    <div class="right-section">
      <div class="map-wrapper">
        <div id="priceFilterContainer" class="filter-container">
          <button class="filter-toggle" id="priceFilterToggle">Price</button>
          <div class="filter-options">
            <button class="filter-btn" data-price="$">$</button>
            <button class="filter-btn" data-price="$$">$$</button>
            <button class="filter-btn" data-price="$$$">$$$</button>
            <button class="filter-btn" data-price="$$$$">$$$$</button>
            <button class="filter-btn clear-filter" title="Clear filters">↻</button>
          </div>
        </div>
        <div id="map"></div>
      </div>
    </div>
  </div>
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.js"></script>
  <script src="js/main.js"></script>

<!-- add tutorial help button on the main map page -- commented by PW on Mar 9 -->
<button id="help-button" class="help-button">?</button>

<!-- add tutorial popup function to the tutorial button -- commented by PW on Mar 9 -->
<div id="tutorialOverlay" class="tutorial-overlay">
  <div class="tutorial-box">
    <button id="tutorialClose" class="tutorial-close">&times;</button>
    <div id="tutorialContent" class="tutorial-content"></div>

    <div class="tutorial-nav">
      <button id="prevSlide">Back</button>
      <button id="nextSlide">Next</button>
    </div>
  </div>
</div>
</body>
</html>
